<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA Settings</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="page-settings">
    <div class="backdrop">
      <div class="blur-orb orb-copper"></div>
      <div class="blur-orb orb-sea"></div>
      <div class="grain"></div>
    </div>

    <main class="settings-shell">
      <header class="settings-header">
        <div>
          <p class="eyebrow">Settings</p>
          <h1>灵魂与运行配置</h1>
          <p class="muted">调整人格、世界书、模型与记忆。</p>
        </div>
        <div class="settings-header-actions">
          <a class="button button-ghost" href="/memories">查看记忆</a>
          <a class="button button-ghost" href="/">返回聊天</a>
        </div>
      </header>

      <div id="notice" class="notice" hidden></div>

      <section class="settings-grid">
        <article class="panel settings-panel">
          <div class="panel-head">
            <p class="eyebrow">Soul</p>
            <h2>人格配置</h2>
          </div>

          <div class="pet-card">
            <div class="pet-frame">
              <img id="petImage" alt="Pet preview" hidden />
              <div id="petFallback" class="pet-fallback">A</div>
            </div>
            <div class="pet-meta">
              <p class="pet-label">Current Soul</p>
              <strong id="petName">AURA</strong>
            </div>
          </div>

          <form id="soulForm" class="stack-form panel-scroll-form">
            <label class="field">
              <span>名称</span>
              <input id="soulName" name="name" maxlength="80" required />
            </label>
            <label class="field">
              <span>性格</span>
              <textarea
                id="soulPersonality"
                name="personality"
                rows="5"
                maxlength="800"
                required
              ></textarea>
            </label>
            <label class="field">
              <span>表达风格</span>
              <textarea id="soulStyle" name="style" rows="3" maxlength="400"></textarea>
            </label>
            <label class="field">
              <span>当前环境与背景</span>
              <textarea
                id="soulScene"
                name="scene"
                rows="4"
                maxlength="600"
                placeholder="例如：当前在安静的夜间房间里，窗外有雨声，空气里有微弱的台灯和光。"
              ></textarea>
            </label>
            <label class="field">
              <span>头像文件名</span>
              <input id="soulImage" name="pet_image" maxlength="255" />
            </label>
            <div class="form-actions">
              <button class="button button-accent" type="submit">保存灵魂</button>
            </div>
          </form>
        </article>

        <article class="panel settings-panel settings-panel-worldbook">
          <div class="panel-head">
            <p class="eyebrow">Worldbook</p>
            <h2>世界书</h2>
          </div>

          <form id="worldbookForm" class="stack-form worldbook-form panel-scroll-form">
            <div class="worldbook-toolbar">
              <button id="addWorldbookEntryBtn" class="button button-ghost" type="button">
                新增条目
              </button>
            </div>

            <section id="worldbookEntries" class="worldbook-list"></section>

            <div class="worldbook-actions form-actions">
              <button class="button button-accent" type="submit">保存世界书</button>
            </div>
          </form>
        </article>

        <article class="panel settings-panel settings-panel-runtime">
          <div class="panel-head">
            <p class="eyebrow">Runtime</p>
            <h2>运行状态</h2>
          </div>

          <div class="runtime-banner">
            <span id="healthBadge" class="status-pill status-offline">Ollama 未连接</span>
            <span id="memoryBadge" class="status-pill">记忆 0</span>
          </div>

          <div class="stack-form panel-scroll-form runtime-form">
            <label class="field">
              <span>Ollama 服务地址</span>
              <input
                id="runtimeBaseUrlInput"
                type="url"
                maxlength="255"
                placeholder="例如：http://192.168.50.51:11434"
              />
            </label>
            <button id="saveBaseUrlBtn" class="button button-primary" type="button">
              保存服务地址
            </button>
            <label class="field">
              <span>当前模型</span>
              <select id="modelSelect"></select>
            </label>
            <button id="saveModelBtn" class="button button-primary" type="button">
              保存当前模型
            </button>
          </div>

          <section class="runtime-card">
            <p class="eyebrow">Stats</p>
            <dl class="runtime-grid">
              <div>
                <dt>当前模型</dt>
                <dd id="runtimeModel">未选择</dd>
              </div>
              <div>
                <dt>可用模型数</dt>
                <dd id="runtimeModelsCount">0</dd>
              </div>
              <div>
                <dt>历史消息数</dt>
                <dd id="runtimeHistoryCount">0</dd>
              </div>
              <div>
                <dt>服务地址</dt>
                <dd id="runtimeBaseUrl">未配置</dd>
              </div>
            </dl>
          </section>

          <div class="action-stack">
            <button id="clearHistoryBtn" class="button button-ghost" type="button">
              清空对话历史
            </button>
            <button id="clearMemoryBtn" class="button button-ghost" type="button">
              清空记忆库
            </button>
          </div>
        </article>
      </section>
    </main>

    <template id="worldbookEntryTemplate">
      <article class="worldbook-entry">
        <div class="worldbook-entry-head">
          <strong class="worldbook-entry-title">世界书条目</strong>
          <button class="button button-ghost worldbook-remove-btn" type="button">删除</button>
        </div>

        <div class="worldbook-entry-grid">
          <label class="field">
            <span>标题</span>
            <input class="worldbook-title" maxlength="80" />
          </label>
          <label class="field">
            <span>关键词</span>
            <input class="worldbook-keywords" maxlength="200" placeholder="多个关键词用逗号分隔" />
          </label>
        </div>

        <label class="field">
          <span>内容</span>
          <textarea class="worldbook-content" rows="5" maxlength="1000"></textarea>
        </label>

        <label class="worldbook-always">
          <input class="worldbook-always-input" type="checkbox" />
          <span>总是加载</span>
        </label>
      </article>
    </template>

    <script src="/static/settings.js" defer></script>
  </body>
</html>
